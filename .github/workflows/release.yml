name: build pkg

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write # to create/upload the Release on tags

jobs:
  pkg:
    runs-on: macos-14 # Apple Silicon runner; ships a Swift toolchain
    env:
      # Code-signing / notarization secrets.
      #   MACOS_CERT_*            — Developer ID *Application* cert (signs the .app)
      #   MACOS_INSTALLER_CERT_*  — Developer ID *Installer* cert (signs the .pkg)  [REQUIRED]
      #   APPLE_*                 — notarization credentials
      # The .pkg is signed with the Installer cert (productsign) and notarized; the
      # Installer cert is REQUIRED, so the build fails fast without it. See
      # installer/README.md for how to create these.
      MACOS_CERT_P12: ${{ secrets.MACOS_CERT_P12 }}
      MACOS_CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
      MACOS_INSTALLER_CERT_P12: ${{ secrets.MACOS_INSTALLER_CERT_P12 }}
      MACOS_INSTALLER_CERT_PASSWORD: ${{ secrets.MACOS_INSTALLER_CERT_PASSWORD }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
    steps:
      - uses: actions/checkout@v6

      # Import the Developer ID *Application* (signs the app, hardened runtime) and
      # *Installer* (signs the .pkg) certs into one throwaway keychain, exposing
      # their identities to bundle.sh / make_pkg.sh. The Installer cert is required.
      - name: Import signing certificates
        run: |
          if [ -z "$MACOS_CERT_P12" ]; then
            echo "::error::MACOS_CERT_P12 is required (Developer ID *Application* cert). The .app inside the .pkg must be Developer-ID signed with the hardened runtime, or Apple notarization returns Invalid. Add it (and MACOS_CERT_PASSWORD)."
            exit 1
          fi
          if [ -z "$MACOS_INSTALLER_CERT_P12" ]; then
            echo "::error::MACOS_INSTALLER_CERT_P12 is required to sign the .pkg (Developer ID *Installer* cert). Add it (and MACOS_INSTALLER_CERT_PASSWORD) to repo secrets."
            exit 1
          fi
          KEYCHAIN="$RUNNER_TEMP/millfolio.keychain-db"
          KPW="$(openssl rand -hex 16)"
          security create-keychain -p "$KPW" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KPW" "$KEYCHAIN"

          import() { # <base64-p12> <password>
            local f="$RUNNER_TEMP/c-$RANDOM.p12"
            echo "$1" | base64 --decode > "$f"
            security import "$f" -P "$2" -A -t cert -f pkcs12 -k "$KEYCHAIN" -T /usr/bin/codesign -T /usr/bin/productsign
            rm -f "$f"
          }
          import "$MACOS_CERT_P12" "$MACOS_CERT_PASSWORD"
          import "$MACOS_INSTALLER_CERT_P12" "$MACOS_INSTALLER_CERT_PASSWORD"

          security set-key-partition-list -S apple-tool:,apple:,codesign:,productsign: -s -k "$KPW" "$KEYCHAIN" >/dev/null
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | sed s/\"//g)

          APP_ID="$(security find-identity -v "$KEYCHAIN" | awk '/Developer ID Application/{print $2; exit}')"
          INST_ID="$(security find-identity -v "$KEYCHAIN" | awk '/Developer ID Installer/{print $2; exit}')"
          if [ -z "$INST_ID" ]; then echo "::error::no Developer ID Installer identity in MACOS_INSTALLER_CERT_P12"; exit 1; fi
          if [ -z "$APP_ID" ]; then echo "::error::no Developer ID Application identity in MACOS_CERT_P12 (the app would be ad-hoc signed -> notarization Invalid)"; exit 1; fi
          echo "MILLFOLIO_SIGN_IDENTITY=$APP_ID" >> "$GITHUB_ENV"
          echo "MILLFOLIO_INSTALLER_IDENTITY=$INST_ID" >> "$GITHUB_ENV"
          echo "MILLFOLIO_KEYCHAIN=$KEYCHAIN" >> "$GITHUB_ENV"
          echo "imported app=${APP_ID:-<none>} installer=$INST_ID"

      - name: Build Millfolio.pkg
        run: |
          chmod +x installer/*.sh installer/scripts/*
          # Version from the tag (v1.2.3 -> 1.2.3), else 0.0.0-dev.
          VER="0.0.0-dev"
          case "$GITHUB_REF" in refs/tags/v*) VER="${GITHUB_REF#refs/tags/v}";; esac
          MILLFOLIO_VERSION="$VER" ./installer/make_pkg.sh "$GITHUB_WORKSPACE/Millfolio.pkg"

      # Notarize the signed .pkg and staple the ticket. Skipped only if the Apple
      # ID secret is unset (e.g. a fork without credentials).
      - name: Notarize and staple
        if: env.APPLE_ID != ''
        run: |
          PKG="$GITHUB_WORKSPACE/Millfolio.pkg"
          # notarytool submit --wait exits 0 even when the result is Invalid, so
          # check the status ourselves and dump Apple's per-issue log on failure.
          OUT="$(xcrun notarytool submit "$PKG" \
            --apple-id "$APPLE_ID" --team-id "$APPLE_TEAM_ID" --password "$APPLE_APP_PASSWORD" \
            --output-format json --wait)"
          echo "$OUT"
          STATUS="$(echo "$OUT" | python3 -c 'import sys,json;print(json.load(sys.stdin).get("status",""))')"
          SID="$(echo "$OUT" | python3 -c 'import sys,json;print(json.load(sys.stdin).get("id",""))')"
          if [ "$STATUS" != "Accepted" ]; then
            echo "::group::notarytool log ($STATUS)"
            xcrun notarytool log "$SID" \
              --apple-id "$APPLE_ID" --team-id "$APPLE_TEAM_ID" --password "$APPLE_APP_PASSWORD" || true
            echo "::endgroup::"
            echo "::error::notarization $STATUS — see the log above for the failing issues"
            exit 1
          fi
          xcrun stapler staple "$PKG"
          xcrun stapler validate "$PKG"

      # Build the `millfolio` CLI as a universal (arm64 + x86_64) binary, sign it
      # with the same Developer ID Application identity + hardened runtime, and
      # tar it for the Homebrew tap. (No notarization: a Developer-ID-signed CLI
      # runs fine from the terminal, and Homebrew doesn't quarantine tap
      # downloads. The target/binary is `millfolio-cli`; we install it as
      # `millfolio` to avoid colliding with the `Millfolio` app on case-insensitive
      # filesystems.) Done while the signing keychain is still alive.
      - name: Build millfolio CLI (universal, signed)
        run: |
          cd menu
          swift build -c release --arch arm64 --arch x86_64 --product millfolio-cli
          BIN="$(swift build -c release --arch arm64 --arch x86_64 --product millfolio-cli --show-bin-path)/millfolio-cli"
          [ -x "$BIN" ] || { echo "::error::CLI binary not found at $BIN"; exit 1; }
          STAGE="$RUNNER_TEMP/millfolio-cli"; mkdir -p "$STAGE"
          cp "$BIN" "$STAGE/millfolio"
          if [ -n "${MILLFOLIO_SIGN_IDENTITY:-}" ]; then
            codesign --force --options runtime --timestamp --sign "$MILLFOLIO_SIGN_IDENTITY" "$STAGE/millfolio"
          else
            echo "==> ad-hoc signing CLI (no Developer ID identity)"; codesign --force --sign - "$STAGE/millfolio" || true
          fi
          codesign --verify --verbose "$STAGE/millfolio" || true
          tar -C "$STAGE" -czf "$GITHUB_WORKSPACE/millfolio-macos.tar.gz" millfolio
          echo "millfolio-macos.tar.gz sha256:"; shasum -a 256 "$GITHUB_WORKSPACE/millfolio-macos.tar.gz"

      - name: Clean up keychain
        if: always()
        run: security delete-keychain "${MILLFOLIO_KEYCHAIN:-$RUNNER_TEMP/millfolio.keychain-db}" || true

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: Millfolio-pkg
          path: Millfolio.pkg
          if-no-files-found: error

      - name: Upload CLI artifact
        uses: actions/upload-artifact@v7
        with:
          name: millfolio-cli
          path: millfolio-macos.tar.gz
          if-no-files-found: error

      # On a version tag (e.g. v0.3.1), publish a Release with the .pkg + CLI
      # tarball attached.
      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          files: |
            Millfolio.pkg
            millfolio-macos.tar.gz
          body: |
            The Millfolio menu-bar app for the engine inference server.

            **Install:** download `Millfolio.pkg` and open it — the installer puts
            **Millfolio** in `/Applications` and (via its preinstall step) quits any
            running copy first, so updating over a running app just works.

            > Signed with a Developer ID Installer certificate and Apple-notarized,
            > so it installs without a Gatekeeper warning.
